<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Artist Explorer</h1>
    <input type="search" id="search" placeholder="Search by title or artist" aria-label="Search artworks">
    <p id="status-message" role="status" aria-live="polite" hidden></p>
    <p id="no-results" hidden>No artworks match your search.</p>
    <ul id="artworks"></ul>
    <button id="load-more" type="button">Load more</button>
    <section id="detail-view" aria-live="polite" hidden>
        <div class="detail-header">
            <h2>Artwork details</h2>
            <button id="close-detail" type="button" aria-label="Close details">Close</button>
        </div>
        <div id="detail-body"></div>
    </section>

    <script>
        const ARTWORKS_PER_PAGE = 8;
        let allArtworks = [];
        let currentPage = 1;
        let totalPages = 1;
        let isLoading = false;

        function escapeHtml(text) {
            const value = text == null ? '' : String(text);

            return value
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function imageUrlFor(imageId, width = 200) {
            if (!imageId) {
                return '';
            }

            return `https://www.artic.edu/iiif/2/${imageId}/full/${width},/0/default.jpg`;
        }

        function hideDetailView() {
            const detailViewElement = document.getElementById('detail-view');
            const detailBodyElement = document.getElementById('detail-body');

            detailBodyElement.innerHTML = '';
            detailViewElement.hidden = true;
        }

        function renderDetailView(artwork) {
            const detailViewElement = document.getElementById('detail-view');
            const detailBodyElement = document.getElementById('detail-body');
            const imageUrl = imageUrlFor(artwork.image_id, 843);

            detailBodyElement.innerHTML = `
                <article class="detail-layout">
                    ${imageUrl ? `<img class="detail-image" src="${imageUrl}" alt="${escapeHtml(artwork.title || 'Artwork')}">` : '<div class="detail-image detail-image-placeholder">No image available</div>'}
                    <div class="detail-text">
                        <h3>${escapeHtml(artwork.title || 'Untitled')}</h3>
                        <p><strong>Artist:</strong> ${escapeHtml(artwork.artist_display || artwork.artist_title || 'Unknown artist')}</p>
                        <p><strong>Date:</strong> ${escapeHtml(artwork.date_display || 'Unknown')}</p>
                        <p><strong>Origin:</strong> ${escapeHtml(artwork.place_of_origin || 'Unknown')}</p>
                        <p><strong>Medium:</strong> ${escapeHtml(artwork.medium_display || 'Not listed')}</p>
                        <p><strong>Dimensions:</strong> ${escapeHtml(artwork.dimensions || 'Not listed')}</p>
                        <p><strong>Department:</strong> ${escapeHtml(artwork.department_title || 'Not listed')}</p>
                        <p><strong>Credit line:</strong> ${escapeHtml(artwork.credit_line || 'Not listed')}</p>
                    </div>
                </article>
            `;

            detailViewElement.hidden = false;
            detailViewElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function openDetailView(artworkId) {
            const detailViewElement = document.getElementById('detail-view');
            const detailBodyElement = document.getElementById('detail-body');

            detailViewElement.hidden = false;
            detailBodyElement.innerHTML = '<p>Loading artwork details...</p>';

            try {
                const response = await fetch(`https://api.artic.edu/api/v1/artworks/${artworkId}?fields=id,title,artist_title,artist_display,date_display,place_of_origin,medium_display,dimensions,department_title,image_id,credit_line`);
                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const data = await response.json();
                renderDetailView(data.data || {});
            } catch (error) {
                console.error('Failed to load artwork details:', error);
                detailBodyElement.innerHTML = '<p>Could not load details for this artwork.</p>';
            }
        }

        function setStatusMessage(message, isError = false) {
        // Update the status message element with the provided message and error state
            const statusElement = document.getElementById('status-message');

            if (!message) {
                statusElement.hidden = true;
                statusElement.textContent = '';
                statusElement.classList.remove('error');
                return;
            }

            statusElement.hidden = false;
            statusElement.textContent = message;
            statusElement.classList.toggle('error', isError);
        }

        function renderArtworks(artworks) {
        // Render the list of artworks in the DOM, showing images and details
            const artworksElement = document.getElementById('artworks');
            const noResultsElement = document.getElementById('no-results');

            artworksElement.innerHTML = artworks
                .map((artwork) => {
                    const imageUrl = imageUrlFor(artwork.image_id, 200);
                    const artworkId = artwork.id || '';

                    return `
                            <li>
                                <button class="artwork-card" type="button" data-artwork-id="${artworkId}" ${artworkId ? '' : 'disabled'} aria-label="View details for ${escapeHtml(artwork.title || 'Untitled')}">
                                    ${imageUrl ? `<img src="${imageUrl}" alt="${escapeHtml(artwork.title || 'Artwork')}">` : '<div class="artwork-image-placeholder">No image</div>'}
                                    <div>
                                        <strong>${escapeHtml(artwork.title || 'Untitled')}</strong><br>
                                        ${escapeHtml(artwork.artist_display || 'Unknown artist')}
                                    </div>
                                </button>
                            </li>
                        `;
                })
                .join('');

            noResultsElement.hidden = artworks.length !== 0;
        }

        function updateLoadMoreButton() {
        // Enable or disable the "Load more" button based on loading state and pagination
            const loadMoreButton = document.getElementById('load-more'); //gets button element from DOM
            const hasMorePages = currentPage < totalPages; //checks if there are more pages to load

            loadMoreButton.disabled = isLoading || !hasMorePages; //disables button if currently loading or no more pages
            loadMoreButton.textContent = isLoading ? 'Loading...' : hasMorePages ? 'Load more' : 'No more artworks'; //updates button text based on state
        }

        function filterArtworks(query) {
        // Filter the artworks based on the search query, matching against title and artist
            const normalizedQuery = query.trim().toLowerCase();

            if (!normalizedQuery) {
                renderArtworks(allArtworks);
                return;
            }

            const filteredArtworks = allArtworks.filter((artwork) => {
                const title = (artwork.title || '').toLowerCase();
                const artist = (artwork.artist_display || '').toLowerCase();

                return title.includes(normalizedQuery) || artist.includes(normalizedQuery);
            });

            renderArtworks(filteredArtworks);
        }

        async function loadArtworks(page, appendResults) {
        // Load artworks from the API for the specified page, optionally appending to existing results
            if (isLoading) {
                return;
            }

            isLoading = true;
            setStatusMessage(appendResults ? 'Loading more artworks...' : 'Loading artworks...');
            updateLoadMoreButton();

            try {
                const response = await fetch(`https://api.artic.edu/api/v1/artworks?page=${page}&limit=${ARTWORKS_PER_PAGE}&fields=id,title,artist_display,image_id`);
                if (!response.ok) {
                    throw new Error(`Request failed with status ${response.status}`);
                }
                const data = await response.json();
                console.log('API response:', data);

                const fetchedArtworks = data.data || [];

                currentPage = page;
                totalPages = data.pagination?.total_pages || page;
                allArtworks = appendResults ? allArtworks.concat(fetchedArtworks) : fetchedArtworks;

                filterArtworks(document.getElementById('search').value);  //start of search filter after loading new artworks
                setStatusMessage('');
            } catch (error) {
                console.error('Failed to fetch artworks:', error);
                setStatusMessage('Could not load artworks. Please try again.', true);
            } finally {
                isLoading = false;
                updateLoadMoreButton();
            }
        }

        document.getElementById('search').addEventListener('input', (event) => {
            filterArtworks(event.target.value);
        });

        document.getElementById('artworks').addEventListener('click', (event) => {
            const cardElement = event.target.closest('[data-artwork-id]');

            if (!cardElement) {
                return;
            }

            const artworkId = cardElement.dataset.artworkId;

            if (artworkId) {
                openDetailView(artworkId);
            }
        });

        document.getElementById('close-detail').addEventListener('click', () => {
            hideDetailView();
        });

        document.getElementById('load-more').addEventListener('click', () => {
            if (currentPage < totalPages) {
                loadArtworks(currentPage + 1, true);
            }
        });

        loadArtworks(1, false);
    </script>
</body>

</html>
