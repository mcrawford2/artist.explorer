<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Explorer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Artist Explorer</h1>
    <ul id="artworks"></ul>

    <script>
        async function loadArtworks() {
            try {
                const response = await fetch('https://api.artic.edu/api/v1/artworks?page=1&limit=4&fields=title,artist_display,image_id');
                const data = await response.json();
                console.log('API response:', data);

                document.getElementById('artworks').innerHTML = data.data
                    .map((artwork) => {
                        const imageUrl = artwork.image_id
                            ? `https://www.artic.edu/iiif/2/${artwork.image_id}/full/200,/0/default.jpg`
                            : '';

                        return `
                            <li>
                                ${imageUrl ? `<img src="${imageUrl}" alt="${artwork.title || 'Artwork'}">` : ''}
                                <div>
                                    <strong>${artwork.title || 'Untitled'}</strong><br>
                                    ${artwork.artist_display || 'Unknown artist'}
                                </div>
                            </li>
                        `;
                    })
                    .join('');
            } catch (error) {
                console.error('Failed to fetch artworks:', error);
            }
        }

        loadArtworks();
    </script>
</body>

</html>
